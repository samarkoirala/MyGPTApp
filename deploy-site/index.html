<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sameep's Snake</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23090810'/%3E%3Cpath d='M15 35c0-11 8-19 19-19 8 0 15 6 15 14 0 9-7 16-16 16H19' fill='none' stroke='%2328f6c9' stroke-width='7' stroke-linecap='round'/%3E%3Ccircle cx='39' cy='25' r='3' fill='%23ff3d8e'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Sameep's Snake game">
        <div class="play-area">
          <div class="topbar">
            <div>
              <p class="eyebrow">Sameep's Snake</p>
              <h1>Neon appetite, midnight reflexes.</h1>
            </div>
            <div class="stats" aria-label="Game stats">
              <div class="stat">
                <span>Score</span>
                <strong id="score">0</strong>
              </div>
              <div class="stat">
                <span>Best</span>
                <strong id="best">0</strong>
              </div>
              <div class="stat">
                <span>Level</span>
                <strong id="level">1</strong>
              </div>
            </div>
          </div>

          <div class="game-wrap">
            <canvas id="game" width="720" height="720" aria-label="Snake playfield"></canvas>
            <div class="screen" id="overlay">
              <div class="mark">SS</div>
              <h2 id="overlayTitle">Ready to glow?</h2>
              <p id="overlayText">Arrow keys or WASD to move. Space pauses. Toggle autopilot to watch the snake seduce the grid by itself.</p>
              <button class="primary" id="startButton" type="button">Start</button>
            </div>
          </div>

          <div class="controls" aria-label="Game controls">
            <div class="speed-group" aria-label="Game speed">
              <span>Speed</span>
              <button class="speed-option" type="button" data-speed="slow">Slow</button>
              <button class="speed-option active" type="button" data-speed="medium">Medium</button>
              <button class="speed-option" type="button" data-speed="high">High</button>
            </div>
            <button id="pauseButton" type="button" title="Pause or resume">Pause</button>
            <button id="soundButton" type="button" title="Toggle sound effects">Sound On</button>
            <label class="toggle" title="Let the game play itself">
              <input id="autoPilot" type="checkbox">
              <span>Autopilot</span>
            </label>
            <button id="restartButton" type="button" title="Restart the run">Restart</button>
          </div>
        </div>

        <aside class="portrait-panel" aria-label="Player portrait">
          <img src="assets/sameep.jpg" alt="Sameep standing by a fountain">
        </aside>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
